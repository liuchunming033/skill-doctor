<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟 - NIO Horizon</title>
  <style>
    /* ============================================
       NIO Horizon Design System — 番茄钟
       ============================================ */

    /* ---------- CSS Reset & Base ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "HarmonyOS Sans", -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background-color: #F6F7FA;  /* #bg_secondary — 番茄钟作为独立工具页使用次级背景 */
      color: #040B29;             /* #text_primary */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ---------- 页面画布卡片 ---------- */
    .app {
      width: 100%;
      max-width: 480px;
      padding: 24px;              /* spacing-6 */
    }

    .pomodoro-card {
      background: #FFFFFF;        /* #bg_default */
      border: 1px solid #CED0D8; /* #border_default */
      border-radius: 4px;         /* radius-sm */
      padding: 32px 24px;         /* spacing-8 上下 / spacing-6 左右 */
      box-shadow: none;           /* 静态卡片无阴影 */
      text-align: center;
    }

    /* ---------- 标题 ---------- */
    .pomodoro-title {
      font-size: 20px;            /* H2 */
      font-weight: 600;           /* SemiBold */
      line-height: 1.40;
      color: #040B29;             /* #text_primary */
      margin-bottom: 32px;        /* spacing-8 */
    }

    /* ---------- ���时器显示 ---------- */
    .timer-display {
      font-size: 72px;
      font-weight: 700;           /* Bold — 大号数据展示 */
      line-height: 1.15;
      color: #040B29;             /* #text_primary */
      letter-spacing: 0.04em;
      margin-bottom: 8px;         /* spacing-2 */
      font-variant-numeric: tabular-nums;
    }

    .timer-label {
      font-size: 14px;            /* Body Default */
      font-weight: 400;           /* Regular */
      color: #868A9A;             /* #text_tertiary */
      margin-bottom: 32px;        /* spacing-8 */
    }

    /* ---------- 进度环 ---------- */
    .progress-ring-container {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto 32px;        /* spacing-8 */
    }

    .progress-ring {
      transform: rotate(-90deg);
      width: 200px;
      height: 200px;
    }

    .progress-ring .bg-circle {
      fill: none;
      stroke: #E6E7EC;            /* #divider_weak */
      stroke-width: 4;
    }

    .progress-ring .fg-circle {
      fill: none;
      stroke: #00B3BE;            /* #bg_brand_default */
      stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.3s ease-out;
    }

    .timer-text-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: 700;
      color: #040B29;             /* #text_primary */
      font-variant-numeric: tabular-nums;
    }

    /* ---------- 状态标签 ---------- */
    .status-badge {
      display: inline-block;
      background: #9BF2EB;        /* #bg_weak_default */
      color: #01A0AC;             /* #text_brand_default */
      font-size: 12px;            /* Caption */
      font-weight: 400;
      line-height: 1.67;
      padding: 2px 8px;           /* Tag padding */
      border-radius: 2px;         /* radius-xs */
      margin-bottom: 24px;        /* spacing-6 */
    }

    /* ---------- 按钮组 ---------- */
    .button-group {
      display: flex;
      gap: 12px;                  /* spacing-3 */
      justify-content: center;
      margin-bottom: 24px;        /* spacing-6 */
    }

    /* 主按钮 */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #00B3BE;        /* #bg_brand_default */
      color: #FFFFFF;             /* #text_inverse */
      font-size: 14px;            /* Body Default */
      font-weight: 400;           /* Regular */
      padding: 8px 24px;          /* 8px 24px */
      border: none;
      border-radius: 4px;         /* radius-sm */
      cursor: pointer;
      transition: background 0.15s ease-out, transform 0.12s ease-out;
      min-width: 100px;
      min-height: 36px;           /* 触控目标 ≥ 44×44 但按钮高度最低 36px */
      line-height: 1;
    }
    .btn-primary:hover {
      background: #00BEBE;        /* #bg_brand_hover */
    }
    .btn-primary:active {
      background: #008296;        /* #bg_brand_press */
      transform: scale(0.98);
    }
    .btn-primary:disabled {
      background: rgba(0,179,190,0.5); /* #bg_brand_disable 50% */
      cursor: not-allowed;
      transform: none;
    }

    /* 次要按钮 */
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #FFFFFF;        /* #bg_default */
      color: #040B29;             /* #text_primary */
      font-size: 14px;            /* Body Default */
      font-weight: 400;           /* Regular */
      padding: 8px 24px;
      border: 1px solid #CED0D8; /* #border_default */
      border-radius: 4px;         /* radius-sm */
      cursor: pointer;
      transition: background 0.15s ease-out, border-color 0.15s ease-out;
      min-width: 100px;
      min-height: 36px;
      line-height: 1;
    }
    .btn-secondary:hover {
      background: rgba(4,11,41,0.06); /* #bg_hover */
      border-color: #E6E7EC;          /* #border_hover */
    }
    .btn-secondary:active {
      background: rgba(4,11,41,0.12); /* #bg_press */
      border-color: #9C9FAC;          /* #border_press */
    }
    .btn-secondary:disabled {
      background: #F6F7FA;            /* #bg_disable */
      color: #BBBDC7;                 /* #text_disable */
      border-color: #E6E7EC;          /* #border_disabled */
      cursor: not-allowed;
    }

    /* 危险按钮 */
    .btn-danger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #FFFFFF;        /* #bg_default */
      color: #E83030;             /* #text_error_default */
      font-size: 14px;            /* Body Default */
      font-weight: 400;           /* Regular */
      padding: 8px 24px;
      border: 1px solid #E83030; /* #border_error_default */
      border-radius: 4px;         /* radius-sm */
      cursor: pointer;
      transition: background 0.15s ease-out;
      min-width: 100px;
      min-height: 36px;
      line-height: 1;
    }
    .btn-danger:hover {
      background: rgba(232,48,48,0.06);
    }
    .btn-danger:disabled {
      color: #BBBDC7;             /* #text_disable */
      border-color: #E6E7EC;      /* #border_disabled */
      cursor: not-allowed;
    }

    /* ---------- 会话统计 ---------- */
    .session-stats {
      display: flex;
      justify-content: center;
      gap: 32px;                  /* spacing-8 */
      padding-top: 24px;          /* spacing-6 */
      border-top: 1px solid #E6E7EC; /* #divider_weak */
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 20px;            /* H2 */
      font-weight: 600;           /* SemiBold */
      color: #040B29;             /* #text_primary */
      line-height: 1.40;
    }

    .stat-label {
      font-size: 12px;            /* Caption */
      font-weight: 400;
      color: #868A9A;             /* #text_tertiary */
      line-height: 1.67;
      margin-top: 4px;            /* spacing-1 */
    }

    /* ---------- 模式切换（Pomodoro / Short Break / Long Break） ---------- */
    .mode-tabs {
      display: flex;
      gap: 4px;                   /* spacing-1 */
      justify-content: center;
      margin-bottom: 24px;        /* spacing-6 */
      background: #F6F7FA;        /* #bg_secondary */
      border-radius: 4px;         /* radius-sm */
      padding: 4px;               /* spacing-1 */
    }

    .mode-tab {
      background: transparent;
      color: #595E72;             /* #text_secondary */
      font-size: 14px;            /* Body Default */
      font-weight: 400;           /* Regular */
      padding: 6px 16px;
      border: none;
      border-radius: 4px;         /* radius-sm */
      cursor: pointer;
      transition: background 0.15s ease-out, color 0.15s ease-out;
      line-height: 1.57;
    }
    .mode-tab:hover {
      color: #040B29;             /* #text_primary */
      background: rgba(4,11,41,0.06); /* #bg_hover */
    }
    .mode-tab.active {
      background: #FFFFFF;        /* #bg_default */
      color: #040B29;             /* #text_primary */
      font-weight: 500;           /* Medium */
      box-shadow: 0px 1px 2px rgba(0,0,0,0.06), 0px 0px 0px 1px rgba(0,0,0,0.04); /* shadow_base */
    }

    /* ---------- 分割线（装饰分隔） ---------- */
    .divider {
      border: none;
      height: 1px;
      background: #E6E7EC;        /* #divider_weak */
      margin: 24px 0;             /* spacing-6 */
    }

    /* ---------- 响应式 ---------- */
    @media (max-width: 520px) {
      .app { padding: 16px; }
      .pomodoro-card { padding: 24px 16px; }
      .timer-display { font-size: 56px; }
      .timer-text-overlay { font-size: 36px; }
      .progress-ring-container,
      .progress-ring { width: 160px; height: 160px; }
      .button-group { flex-wrap: wrap; }
      .btn-primary, .btn-secondary, .btn-danger { min-width: 80px; padding: 8px 16px; }
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="pomodoro-card">

      <!-- 标题 -->
      <h1 class="pomodoro-title">番茄钟</h1>

      <!-- 模式切换 -->
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="pomodoro">番茄</button>
        <button class="mode-tab" data-mode="short-break">短休息</button>
        <button class="mode-tab" data-mode="long-break">长休息</button>
      </div>

      <!-- 状态标签 -->
      <span class="status-badge" id="statusBadge">工作中</span>

      <!-- 进度环 + 计时 -->
      <div class="progress-ring-container">
        <svg class="progress-ring" viewBox="0 0 200 200">
          <circle class="bg-circle" cx="100" cy="100" r="88" />
          <circle class="fg-circle" id="progressCircle" cx="100" cy="100" r="88"
                  stroke-dasharray="553" stroke-dashoffset="0" />
        </svg>
        <div class="timer-text-overlay" id="timerDisplay">25:00</div>
      </div>

      <!-- 按钮组 -->
      <div class="button-group">
        <button class="btn-primary" id="btnStart">开始</button>
        <button class="btn-secondary" id="btnPause" disabled>暂停</button>
        <button class="btn-danger" id="btnReset">重置</button>
      </div>

      <!-- 分割线 -->
      <hr class="divider">

      <!-- 会话统计 -->
      <div class="session-stats">
        <div class="stat-item">
          <div class="stat-value" id="completedCount">0</div>
          <div class="stat-label">已完成</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="totalMinutes">0</div>
          <div class="stat-label">总时长(分)</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    (function() {
      'use strict';

      /* ---------- 模式配置 ---------- */
      const MODES = {
        'pomodoro':    { label: '工作中', duration: 25 * 60, color: '#00B3BE' },
        'short-break': { label: '短休息', duration: 5 * 60,  color: '#00B3BE' },
        'long-break':  { label: '长休息', duration: 15 * 60, color: '#00B3BE' },
      };

      /* ---------- DOM 引用 ---------- */
      const timerDisplay    = document.getElementById('timerDisplay');
      const statusBadge     = document.getElementById('statusBadge');
      const progressCircle  = document.getElementById('progressCircle');
      const btnStart        = document.getElementById('btnStart');
      const btnPause        = document.getElementById('btnPause');
      const btnReset        = document.getElementById('btnReset');
      const completedCount  = document.getElementById('completedCount');
      const totalMinutes    = document.getElementById('totalMinutes');
      const modeTabs        = document.querySelectorAll('.mode-tab');

      /* ---------- 状态 ---------- */
      let currentMode   = 'pomodoro';
      let timeLeft      = MODES[currentMode].duration;
      let totalDuration = MODES[currentMode].duration;
      let isRunning     = false;
      let isPaused      = false;
      let timerId       = null;
      let completed     = 0;
      let totalWorkMin  = 0;
      const CIRCUMFERENCE = 2 * Math.PI * 88; // ≈ 553

      /* ---------- 工具函数 ---------- */
      function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      }

      function updateDisplay() {
        timerDisplay.textContent = formatTime(timeLeft);
        const offset = CIRCUMFERENCE * (1 - timeLeft / totalDuration);
        progressCircle.setAttribute('stroke-dashoffset', offset);
      }

      function updateUI() {
        statusBadge.textContent = MODES[currentMode].label;
        btnStart.disabled = isRunning;
        btnPause.disabled = !isRunning;
        // 按钮文字
        btnStart.textContent = isRunning ? '运行中' : (isPaused ? '继续' : '开始');
        btnPause.textContent = isPaused ? '已暂停' : '暂停';
        updateDisplay();
      }

      function stopTimer() {
        if (timerId) {
          clearInterval(timerId);
          timerId = null;
        }
        isRunning = false;
      }

      function switchMode(mode) {
        if (isRunning) stopTimer();
        currentMode = mode;
        isPaused = false;
        timeLeft = MODES[mode].duration;
        totalDuration = MODES[mode].duration;
        // 更新 tab 激活态
        modeTabs.forEach(tab => {
          tab.classList.toggle('active', tab.dataset.mode === mode);
        });
        updateUI();
      }

      function startTimer() {
        if (isRunning) return;
        if (isPaused) {
          // 继续
          isPaused = false;
          isRunning = true;
          timerId = setInterval(tick, 1000);
          updateUI();
          return;
        }
        // 全新开始
        isRunning = true;
        timerId = setInterval(tick, 1000);
        updateUI();
      }

      function pauseTimer() {
        if (!isRunning) return;
        stopTimer();
        isPaused = true;
        updateUI();
      }

      function resetTimer() {
        stopTimer();
        isPaused = false;
        timeLeft = MODES[currentMode].duration;
        totalDuration = MODES[currentMode].duration;
        updateUI();
      }

      function tick() {
        if (timeLeft > 0) {
          timeLeft--;
          updateDisplay();
          const offset = CIRCUMFERENCE * (1 - timeLeft / totalDuration);
          progressCircle.setAttribute('stroke-dashoffset', offset);
        }
        if (timeLeft <= 0) {
          stopTimer();
          isPaused = false;
          // 番茄完成时计数
          if (currentMode === 'pomodoro') {
            completed++;
            totalWorkMin += Math.floor(MODES[currentMode].duration / 60);
            completedCount.textContent = completed;
            totalMinutes.textContent = totalWorkMin;
          }
          // 自动切换模式
          const next = currentMode === 'pomodoro' ? 'short-break' : 'pomodoro';
          switchMode(next);
          // 播放提示（简单视觉反馈）
          document.body.style.backgroundColor = '#9BF2EB'; /* #bg_weak_default 闪烁提示 */
          setTimeout(() => {
            document.body.style.backgroundColor = '#F6F7FA';
          }, 600);
        }
      }

      /* ---------- 事件绑定 ---------- */
      btnStart.addEventListener('click', startTimer);
      btnPause.addEventListener('click', pauseTimer);
      btnReset.addEventListener('click', resetTimer);

      modeTabs.forEach(tab => {
        tab.addEventListener('click', function() {
          switchMode(this.dataset.mode);
        });
      });

      /* ---------- 初始化 ---------- */
      updateUI();

    })();
  </script>
</body>
</html>
