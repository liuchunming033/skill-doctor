<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 1680">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L12 5 L0 10 z"/>
    </marker>
  </defs>

  <!-- Canvas background -->
  <rect x="0" y="0" width="1680" height="1680" fill="#F5F0E8" rx="0"/>

  <!-- Title -->
  <text x="840" y="90" text-anchor="middle" font-size="44" font-weight="700" fill="#1A1A1A">AI Agent 开发工作流</text>
  <text x="840" y="130" text-anchor="middle" font-size="22" fill="#6B6B6B">从构思到交付的 7 个阶段 · 环形流程</text>

  <!-- ============================================================ -->
  <!-- Ring layout: 7 nodes evenly spaced around a circle            -->
  <!-- Center: (840, 860), Ring radius: 500                          -->
  <!-- Each node: 60° apart, starting from top (12 o'clock)         -->
  <!-- ============================================================ -->

  <!--
    Angles (degrees, clockwise from top):
    0:   brainstorming       (840, 360)
    60:  using-git-worktrees (1090, 610)
    120: writing-plans       (1090, 1110)
    180: subagent-driven     (840, 1360)
    240: test-driven-dev     (590, 1110)
    300: requesting-review   (590, 610)
  -->

  <!--
    7th node "finishing-a-development-branch" sits at center
    as the hub / final step
  -->

  <!-- ── Connector ring (arcs between nodes) ── -->

  <!-- Arc 1→2: brainstorming → using-git-worktrees -->
  <path d="M 840 360 A 500 500 0 0 1 1090 610"
        fill="none" stroke="#E85D5D" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Arc 2→3: using-git-worktrees → writing-plans -->
  <path d="M 1090 610 A 500 500 0 0 1 1090 1110"
        fill="none" stroke="#E85D5D" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Arc 3→4: writing-plans → subagent-driven -->
  <path d="M 1090 1110 A 500 500 0 0 1 840 1360"
        fill="none" stroke="#E85D5D" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Arc 4→5: subagent-driven → test-driven-dev -->
  <path d="M 840 1360 A 500 500 0 0 1 590 1110"
        fill="none" stroke="#E85D5D" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Arc 5→6: test-driven-dev → requesting-review -->
  <path d="M 590 1110 A 500 500 0 0 1 590 610"
        fill="none" stroke="#E85D5D" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Arc 6→7: requesting-review → finishing -->
  <path d="M 590 610 A 500 500 0 0 1 750 375"
        fill="none" stroke="#D44A4A" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Arc 7→1: finishing → brainstorming (back to start) -->
  <path d="M 930 375 A 500 500 0 0 1 840 360"
        fill="none" stroke="#D44A4A" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- Node 1: brainstorming (top, 12 o'clock)                      -->
  <!-- ============================================================ -->
  <rect x="620" y="280" width="440" height="140" rx="10" fill="#FFFFFF"/>
  <rect x="620" y="280" width="440" height="6" rx="3" fill="#E85D5D"/>
  <text x="840" y="320" text-anchor="middle" font-size="24" font-weight="700" fill="#1A1A1A">1. Brainstorming</text>
  <text x="840" y="348" text-anchor="middle" font-size="16" fill="#6B6B6B">构思阶段</text>
  <text x="840" y="374" text-anchor="middle" font-size="14" fill="#6B6B6B">通过提问打磨想法，探索替代方案</text>
  <text x="840" y="396" text-anchor="middle" font-size="14" fill="#6B6B6B">按模块展示设计，保存设计文档</text>

  <!-- ============================================================ -->
  <!-- Node 2: using-git-worktrees (2 o'clock)                      -->
  <!-- ============================================================ -->
  <rect x="970" y="530" width="320" height="140" rx="10" fill="#FFFFFF"/>
  <rect x="970" y="530" width="320" height="6" rx="3" fill="#E85D5D"/>
  <text x="1130" y="570" text-anchor="middle" font-size="24" font-weight="700" fill="#1A1A1A">2. Git Worktrees</text>
  <text x="1130" y="598" text-anchor="middle" font-size="16" fill="#6B6B6B">工作区隔离</text>
  <text x="1130" y="624" text-anchor="middle" font-size="15" fill="#6B6B6B">在新分支上创建隔离工作区</text>
  <text x="1130" y="646" text-anchor="middle" font-size="15" fill="#6B6B6B">运行项目初始化，验证测试基线</text>

  <!-- ============================================================ -->
  <!-- Node 3: writing-plans (4 o'clock)                            -->
  <!-- ============================================================ -->
  <rect x="970" y="1030" width="320" height="140" rx="10" fill="#FFFFFF"/>
  <rect x="970" y="1030" width="320" height="6" rx="3" fill="#E85D5D"/>
  <text x="1130" y="1070" text-anchor="middle" font-size="24" font-weight="700" fill="#1A1A1A">3. Writing Plans</text>
  <text x="1130" y="1098" text-anchor="middle" font-size="16" fill="#6B6B6B">编写计划</text>
  <text x="1130" y="1124" text-anchor="middle" font-size="15" fill="#6B6B6B">将工作拆分为小任务（2-5分钟）</text>
  <text x="1130" y="1146" text-anchor="middle" font-size="15" fill="#6B6B6B">每个任务包含文件路径、完整代码、验证步骤</text>

  <!-- ============================================================ -->
  <!-- Node 4: subagent-driven (6 o'clock)                          -->
  <!-- ============================================================ -->
  <rect x="680" y="1280" width="320" height="140" rx="10" fill="#FFFFFF"/>
  <rect x="680" y="1280" width="320" height="6" rx="3" fill="#E85D5D"/>
  <text x="840" y="1320" text-anchor="middle" font-size="24" font-weight="700" fill="#1A1A1A">4. Subagent 执行</text>
  <text x="840" y="1348" text-anchor="middle" font-size="16" fill="#6B6B6B">分派执行</text>
  <text x="840" y="1374" text-anchor="middle" font-size="15" fill="#6B6B6B">每个任务派发独立子 Agent</text>
  <text x="840" y="1396" text-anchor="middle" font-size="15" fill="#6B6B6B">两阶段审查：规范合规 → 代码质量</text>

  <!-- ============================================================ -->
  <!-- Node 5: test-driven-development (8 o'clock)                  -->
  <!-- ============================================================ -->
  <rect x="390" y="1030" width="320" height="140" rx="10" fill="#FFFFFF"/>
  <rect x="390" y="1030" width="320" height="6" rx="3" fill="#E85D5D"/>
  <text x="550" y="1070" text-anchor="middle" font-size="24" font-weight="700" fill="#1A1A1A">5. TDD</text>
  <text x="550" y="1098" text-anchor="middle" font-size="16" fill="#6B6B6B">测试驱动开发</text>
  <text x="550" y="1124" text-anchor="middle" font-size="15" fill="#6B6B6B">RED → GREEN → REFACTOR</text>
  <text x="550" y="1146" text-anchor="middle" font-size="15" fill="#6B6B6B">先写失败测试，再写最小实现代码</text>

  <!-- ============================================================ -->
  <!-- Node 6: requesting-code-review (10 o'clock)                  -->
  <!-- ============================================================ -->
  <rect x="390" y="530" width="320" height="140" rx="10" fill="#FFFFFF"/>
  <rect x="390" y="530" width="320" height="6" rx="3" fill="#E85D5D"/>
  <text x="550" y="570" text-anchor="middle" font-size="24" font-weight="700" fill="#1A1A1A">6. Code Review</text>
  <text x="550" y="598" text-anchor="middle" font-size="16" fill="#6B6B6B">请求代码审查</text>
  <text x="550" y="624" text-anchor="middle" font-size="15" fill="#6B6B6B">对照计划审查，按严重程度报告问题</text>
  <text x="550" y="646" text-anchor="middle" font-size="15" fill="#6B6B6B">严重问题阻止进度</text>

  <!-- ============================================================ -->
  <!-- Hub node: finishing (center)                                 -->
  <!-- ============================================================ -->
  <rect x="690" y="790" width="300" height="140" rx="12" fill="#E85D5D"/>
  <text x="840" y="835" text-anchor="middle" font-size="26" font-weight="700" fill="#F5F0E8">7. 分支收尾</text>
  <text x="840" y="865" text-anchor="middle" font-size="17" fill="#F5F0E8" opacity="1">Finishing a Branch</text>
  <text x="840" y="895" text-anchor="middle" font-size="15" fill="#F5F0E8">验证测试 → 选择后续动作</text>
  <text x="840" y="915" text-anchor="middle" font-size="15" fill="#F5F0E8">（合并 / PR / 保留 / 丢弃）</text>

  <!-- ============================================================ -->
  <!-- Center hub: "AI Agent" label                                 -->
  <!-- ============================================================ -->
  <rect x="780" y="735" width="120" height="36" rx="18" fill="#1A1A1A"/>
  <text x="840" y="759" text-anchor="middle" font-size="18" font-weight="700" fill="#F5F0E8">AI Agent</text>

  <!-- ============================================================ -->
  <!-- Legend / footer                                              -->
  <!-- ============================================================ -->
  <rect x="500" y="1520" width="680" height="60" rx="8" fill="#FFFFFF"/>
  <circle cx="530" cy="1550" r="6" fill="#E85D5D"/>
  <text x="550" y="1555" font-size="14" fill="#6B6B6B">正向流程（顺序执行）</text>
  <circle cx="780" cy="1550" r="6" fill="#D44A4A"/>
  <text x="800" y="1555" font-size="14" fill="#6B6B6B">循环闭合（回顾迭代）</text>
  <circle cx="1020" cy="1550" r="6" fill="#1A1A1A"/>
  <text x="1040" y="1555" font-size="13" fill="#6B6B6B">中枢节点（最终阶段）</text>
</svg>
