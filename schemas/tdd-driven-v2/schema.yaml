# ================================================================
# tdd-driven-v2 — Atomic TDD Schema
# OpenSpec Workflow DSL × Superpowers Skill Library
# ================================================================
# 设计原则：
#   任务粒度是物理约束，instruction 是软约束。
#   每个 task = 恰好一个 TDD 阶段（RED / GREEN / REFACTOR）
#   每个 subagent = 恰好一个 task（物理上下文隔离）
#   每个 subagent = 必须提供测试输出作为证据
# ================================================================

name: tdd-driven-v2
version: "2.0"
description: |
  Atomic TDD workflow with subagent isolation and evidence verification.
  Built on OpenSpec + Superpowers integration pattern.
  Core constraint: each task = exactly one TDD phase;
  one subagent per phase; test output evidence required.

# ================================================================
# 制品 DAG（Artifact Directed Acyclic Graph）
# 状态：BLOCKED → READY → DONE
# requires：文件存在性检测（不检查内容）
# ================================================================

artifacts:
  - id: proposal
    generates: proposal.md
    template: templates/proposal.md
    description: Initial change proposal with testable behaviors (WHEN/THEN)
    instruction: |
      Create a proposal that explains WHY this change is needed.

      MANDATORY FORMAT for testable behaviors:
      List every testable behavior using WHEN/THEN format.

      Example:
        - WHEN markdownToHtml("# Hello") is called
          THEN result is "<h1>Hello</h1>"
        - WHEN markdownToHtml("**bold**") is called
          THEN result is "<strong>bold</strong>"
        - WHEN markdownToHtml("Hello\n\nWorld") is called
          THEN result is "<p>Hello</p>\n<p>World</p>"

      Do NOT describe implementation details.
      Focus on WHAT should happen, not HOW.
    requires: []

  - id: specs
    generates: specs/**/*.md
    template: templates/spec.md
    description: Behavioral specifications (GIVEN/WHEN/THEN scenarios)
    instruction: |
      Write behavioral specs using GIVEN/WHEN/THEN scenarios.

      Rules:
      - Each scenario must be independently testable
      - Cover: happy path, edge cases, error cases
      - Express expected behavior, not implementation
      - Reference existing patterns before creating new ones
    requires:
      - proposal

  - id: design
    generates: design.md
    template: templates/design.md
    description: Technical design with test strategy and exact file paths
    instruction: |
      Create a technical design explaining HOW to implement.

      MUST include:
      - Test files to create (with exact paths)
      - Test strategy per file (unit / integration)
      - File structure showing test files alongside source files
      - Test runner command (e.g., npm test)
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    template: templates/tasks.md
    description: Atomic TDD task list — one TDD phase per task, checkbox format
    instruction: |
      CRITICAL: Break work into ATOMIC TDD tasks.
      Each task is EXACTLY ONE TDD phase (RED, GREEN, or REFACTOR).

      MANDATORY FORMAT — use checkbox syntax for every task:

        ### Feature: [feature name]
        - [ ] RED: Write failing test — [具体测试什么行为]
        - [ ] GREEN: Implement — [最小实现描述，引用对应的 RED 任务]
        - [ ] REFACTOR: Cleanup — [清理描述]（可选，不是每个 GREEN 都需要）

      Rules:
      1. NEVER combine RED and GREEN in one task
      2. Every GREEN task must reference its corresponding RED test
      3. Every task MUST use "- [ ]" checkbox format — no other format allowed
      4. Tasks alternate: RED → GREEN → (REFACTOR) → RED → GREEN → ...
      5. No task should take more than 2-5 minutes
      6. Do NOT group by feature — group by TDD phase order

      ✅ CORRECT example:
        - [ ] RED: Write failing test for heading parsing — create markdown.test.ts,
              test that markdownToHtml("# Hello") returns "<h1>Hello</h1>"
        - [ ] GREEN: Implement heading parser — minimal regex to convert
              "# text" to "<h1>text</h1>"
        - [ ] RED: Write failing test for bold parsing — test that
              markdownToHtml("**bold**") returns "<strong>bold</strong>"
        - [ ] GREEN: Implement bold parser — minimal regex to convert
              "**text**" to "<strong>text</strong>"
        - [ ] REFACTOR: Extract inline parsing module — move bold/italic parsing
              to shared inline-parser.ts

      ❌ WRONG example (do NOT do this):
        - [ ] Implement Markdown parser — support headings, bold, italic, links with tests
              ← WRONG: combines everything
    requires:
      - specs
      - design

  - id: plans
    generates: plan.md
    template: templates/plan.md
    description: Execution plan with 1:1 task mapping and evidence requirements
    instruction: |
      PRECHECK: Verify superpowers:writing-plans skill is available.
      If not available, STOP and report the missing skill.

      Create a detailed execution plan. Each plan step maps to EXACTLY ONE task from tasks.md.

      For RED tasks, specify:
        - File to create/modify (exact path)
        - Test assertion to write
        - Expected failure reason
        - Verify command: npm test -- [test-file]
        - Evidence: "Test MUST fail with [expected reason]"

      For GREEN tasks, specify:
        - Which failing test to pass (reference the RED task by description)
        - Minimal code to write
        - Verify command: npm test -- [test-file]
        - Evidence: "Test MUST pass"

      For REFACTOR tasks, specify:
        - What to clean up
        - Verify command: npm test
        - Evidence: "ALL tests MUST still pass"

      After plan is created, append this section:

      ---
      ## Execution Mode Selection
      REQUIRED: Use superpowers:subagent-driven-development skill for execution.
      DO NOT use executing-plans or inline execution.
      Reason: Atomic TDD tasks require subagent isolation.
      Each task is a single TDD phase — one subagent per phase.
    requires:
      - tasks

# ================================================================
# Apply 阶段（实现执行）— Superpowers 五阶段技能调用链
# ================================================================

apply:
  requires:
    - plans
  tracks: tasks.md # 解析 "- [ ]" / "- [x]" checkbox 追踪进度
  instruction: |
    MANDATORY execution sequence — invoke Superpowers skills in this exact order.
    DO NOT skip any phase. DO NOT use executing-plans or inline execution.

    ──────────────────────────────────────────────────────────────
    PHASE 1: superpowers:brainstorming
    ──────────────────────────────────────────────────────────────
    Trigger: human ("开始实现，规约在 openspec/changes/<name>/")
    Input:   openspec/changes/<name>/specs/ + design.md
    Execute 9-step flow:
      explore context → clarify questions → select approach
      → confirm in segments → write design doc → self-review → user approval
    Gate: WAIT for user approval before proceeding to Phase 2.

    ──────────────────────────────────────────────────────────────
    PHASE 2: superpowers:using-git-worktrees
    ──────────────────────────────────────────────────────────────
    Trigger: AUTOMATIC after brainstorming design approval
    Action:  create branch in .worktrees/<change-name>,
             install dependencies, verify test baseline passes
    Gate:    baseline tests must pass before Phase 3.

    ──────────────────────────────────────────────────────────────
    PHASE 3: superpowers:writing-plans
    ──────────────────────────────────────────────────────────────
    Trigger: AUTOMATIC — brainstorming last step "Transition to implementation"
    Input:   brainstorming design document (NOT tasks.md from OpenSpec)
    Output:  docs/superpowers/plans/ — 2-5 min atomic steps per task
    Gate:    user selects "Subagent-Driven" execution mode to proceed.

    ──────────────────────────────────────────────────────────────
    PHASE 4: superpowers:subagent-driven-development  [LOOP]
    ──────────────────────────────────────────────────────────────
    Trigger: AUTOMATIC after user confirms Subagent-Driven mode
    Rules:
    - Dispatch ONE subagent per task, in order — no skipping, no reordering
    - NEVER dispatch multiple implementation subagents in parallel

    Per-task inner loop (repeat for every task in tasks.md):

      Step A — Implementation subagent [superpowers:test-driven-development]:
        RED phase:
          Write failing test only — MUST provide actual test failure output
          If subagent reports "all tests passing" → RED FLAG → re-dispatch
        GREEN phase:
          Write minimal implementation — MUST provide test pass output
          If "still failing" → do NOT mark complete → re-dispatch with fix
        REFACTOR phase (optional):
          Clean up — MUST provide full test suite output
          Any failure → do NOT mark complete → re-dispatch with fix

      Step B — Spec reviewer subagent [superpowers:requesting-code-review]:
          Check: did subagent build exactly what was requested?
                 Nothing more, nothing less?
          Fail → re-dispatch implementation subagent with correction

      Step C — Code quality reviewer subagent [superpowers:requesting-code-review]:
          Check: code clean, tested, maintainable?
          Fail → re-dispatch with fix

      Steps B + C both approved → mark tasks.md: - [ ] → - [x] → next task

    ──────────────────────────────────────────────────────────────
    PHASE 5: superpowers:finishing-a-development-branch
    ──────────────────────────────────────────────────────────────
    Trigger: AUTOMATIC after all tasks complete + final cross-task review passes
    Actions:
      1. Run full test suite — verify 0 failures
      2. Verify all specs are satisfied
      3. Check for TODO markers
      4. Present options: merge / create PR / keep branch / discard
    Gate: WAIT for human to choose final disposition.
