# ============================================================
# spec-driven-nio — OpenSpec Workflow DSL × Superpowers Skill Library
# ============================================================
# 架构理念：
#   OpenSpec  = Workflow DSL  （流程骨架、制品状态机、人工门禁）
#   Superpowers = Skill Library（工程纪律执行引擎）
#
# 五阶段流程：
#   [/opsx:explore]  ← 可选，自由探索，无产物，无人工门
#         ↓
#   /opsx:propose    Spec + Design（规约+方案一体化，人工门禁 → SHA256 锁）
#         ↓
#   /opsx:apply      Build（编码实现，启动前验证 SHA256）
#         ↓
#   /opsx:verify     Verify（评审+测试，人工门禁 → SHA256 锁）
#         ↓
#   /opsx:archive    PR（提PR+资料整理，启动前验证 SHA256）
# ============================================================

name: spec-driven-nio
version: "1.1"
description: |
  OpenSpec 作为 Workflow DSL，Superpowers 作为 Skill Library 的组合系统。
  核心约束：
  - writing-plans 生成独立的工程实现计划（.superpowers/impl-plan.md），
    基于 brainstorming 的设计分析，不读取也不依赖 OpenSpec 的 tasks.md。
  - OpenSpec 的 tasks.md 是业务任务清单（供 OpenSpec checkbox 追踪），
    Superpowers 的 impl-plan.md 是工程实现步骤——两者独立、互不依赖。
  - /opsx:explore 阶段使用 OpenSpec 原生能力，不引入 Superpowers brainstorming。

# ============================================================
# 制品定义（Artifacts DAG）
# ============================================================
# 状态转换：BLOCKED → READY → DONE
# requires: 基于文件存在性检测（不检查内容）
# tracks:   解析 `- [ ]` / `- [x]` checkbox，追踪完成进度

artifacts:
  proposal:
    file: "proposal.md"
    template: "templates/proposal.md"
    description: "可测试的行为规约（WHEN/THEN 格式），聚焦可观察结果，不含技术细节"
    requires: []

  spec:
    file: "specs/{change}.md"
    template: "templates/spec.md"
    description: "完整 BDD 场景（GIVEN/WHEN/THEN），覆盖主路径、边界与错误场景"
    requires:
      - proposal

  design:
    file: "design.md"
    template: "templates/design.md"
    description: "技术设计文档，包含架构决策、组件变更列表与测试策略"
    requires:
      - spec

  tasks:
    file: "tasks.md"
    template: "templates/tasks.md"
    description: |
      ⚠️ OpenSpec 业务任务清单——供 OpenSpec 状态追踪使用。
      仅记录业务级任务，不包含工程实现步骤。
      工程步骤由 Superpowers:writing-plans 输出到 .superpowers/impl-plan.md。
    requires:
      - design
    tracks: true # 启用 checkbox 追踪：- [ ] / - [x]

  plan:
    file: ".superpowers/impl-plan.md"
    template: "templates/plan.md"
    description: |
      ⚠️ Superpowers:writing-plans 生成的工程实现计划（独立文件）。
      基于 brainstorming 对 proposal/spec/design 的分析结果生成。
      绝对不读取、不依赖 OpenSpec 的 tasks.md。
      每个步骤是 2-5 分钟可完成的原子任务，包含 RED/GREEN/REFACTOR 标注。
    requires:
      - tasks # 确保业务任务清单已就绪
    tracks: true # 启用 checkbox 追踪：- [ ] RED: / - [ ] GREEN:

# ============================================================
# SHA256 最轻量防护（人工门禁 → 锁定 → 验证）
# ============================================================
# 工作原理：
#   1. 人工门禁通过后，Dispatcher 计算指定制品文件的 SHA256 并写入 lock 文件。
#   2. 下一命令（如 /opsx:apply）启动时，重新计算哈希与记录对比。
#   3. 不一致 → 中止并告警，强制重新走人工确认门。
#
# 防护效果：防止已批准制品在 apply/archive 前被悄悄修改。

sha256_lock:
  lock_dir: ".opsx/locks"
  lock_file_pattern: ".opsx/locks/{change}.{gate}.lock.json"
  hash_algorithm: sha256
  description: |
    锁文件格式（JSON）：
    {
      "change": "<change-name>",
      "gate": "<gate-name>",
      "locked_at": "<ISO-8601>",
      "approved_by": "human",
      "artifacts": {
        "<relative-path>": "<sha256-hex>"
      }
    }
  on_mismatch: |
    ❌ SHA256 校验失败！制品自人工确认后已被修改。
    变更记录：{change}
    门禁阶段：{gate}
    不一致文件：{mismatched_files}

    处理选项：
      A. 重新执行 /opsx:propose 并再次通过人工确认门
      B. 确认修改合法，手动执行 openspec sha256-refresh {change} --gate {gate}

    当前 apply/archive 已中止。

# ============================================================
# 人工门禁定义（Gates）
# ============================================================

gates:
  propose-approved:
    stage: propose
    description: "Propose 阶段人工确认门——规约与设计方案的书面批准"
    artifacts_to_lock:
      - file: "proposal.md"
      - file: "specs/{change}.md"
      - file: "design.md"
      - file: "tasks.md"
    prompt: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      🚦 人工确认门：PROPOSE-APPROVED
      变更：{change}
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      请审查以下制品：
        📄 proposal.md        — WHEN/THEN 行为规约
        📄 specs/{change}.md  — GIVEN/WHEN/THEN BDD 场景
        📄 design.md          — 技术设计 + 测试策略
        📄 tasks.md           — 业务任务清单

      确认通过后输入 APPROVE，或输入修改意见（AI 将修改后重新请求确认）。

      ⚡ 确认后自动计算 SHA256 并锁定以上制品。

  verify-approved:
    stage: verify
    description: "Verify 阶段人工确认门——代码审查与测试结果的书面批准"
    artifacts_to_lock:
      - file: ".superpowers/impl-plan.md"
      - file: ".superpowers/code-review-report.md"
    prompt: |
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      🚦 人工确认门：VERIFY-APPROVED
      变更：{change}
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      请审查以下验证证据：
        📊 测试结果         — 所有 spec 场景覆盖，0 failing
        📋 代码审查报告     — .superpowers/code-review-report.md
        🌿 分支状态         — finishing-a-development-branch 通过

      确认通过后输入 APPROVE，或输入修改意见（AI 将修改后重新请求确认）。

      ⚡ 确认后自动计算 SHA256 并锁定以上制品。

# ============================================================
# 命令定义（Commands）
# ============================================================

commands:
  # ──────────────────────────────────────────────────────
  # 阶段 0：explore（可选）
  # ──────────────────────────────────────────────────────
  explore:
    description: "自由探索现有代码结构，理解项目背景，无产物要求，无人工门禁"
    optional: true
    produces: []
    sha256_verify: null
    gate: null
    skills: [] # ⚠️ 不引入 Superpowers skills——使用 OpenSpec 原生能力
    instruction: |
      ## /opsx:explore — 自由探索阶段

      目标：理解现有代码结构和项目背景，为后续 propose 阶段提供信息基础。

      ### 执行准则
      - 使用 OpenSpec 原生能力（文件读取、目录遍历、代码搜索）
      - 【禁止】引入 Superpowers:brainstorming——explore 阶段不做需求讨论
      - 探索范围自定义，无强制格式
      - 可将探索笔记保存到 .opsx/explore-{change}.md（完全可选）

      ### 建议探索维度
      - 目录结构与模块边界
      - 现有测试覆盖与测试框架
      - 技术栈与关键依赖
      - 代码风格与现有规范
      - 潜在影响范围（变更波及的文件）

      ### 完成标志
      探索完成后告知用户主要发现，然后建议执行 /opsx:propose 开始正式设计。
      本阶段不产出任何制品，不触发任何门禁。

  # ──────────────────────────────────────────────────────
  # 阶段 1：propose（Spec + Design 一体化）
  # ──────────────────────────────────────────────────────
  propose:
    description: "规约+方案一体化生成，完成后触发人工确认门并锁定 SHA256"
    optional: false
    produces:
      - proposal
      - spec
      - design
      - tasks
    sha256_verify: null # 首阶段，无需验证前置锁
    gate: propose-approved # 完成后触发人工门禁
    skills: [] # OpenSpec 原生生成，不调用 Superpowers
    instruction: |
      ## /opsx:propose — 规约+方案一体化阶段

      ### 执行顺序（严格按序）

      **Step 1 — 生成 proposal.md**
      - 使用模板 templates/proposal.md
      - 聚焦 WHEN/THEN 可观察行为，不含技术实现细节
      - 每个 WHEN/THEN 必须可独立验证

      **Step 2 — 生成 specs/{change}.md**
      - 使用模板 templates/spec.md
      - 将 proposal 的每个 WHEN/THEN 展开为 GIVEN/WHEN/THEN 完整 BDD 场景
      - 补充边界条件和错误场景

      **Step 3 — 生成 design.md**
      - 使用模板 templates/design.md
      - 基于 specs/ 场景推导技术方案
      - 必须包含：架构决策、变更文件列表、测试策略

      **Step 4 — 生成 tasks.md**
      - 使用模板 templates/tasks.md
      - ⚠️ 这是 OpenSpec 业务任务清单，不是工程实现步骤
      - 每个 task 映射到 specs/ 中的一个场景
      - 格式：`- [ ] TASK-NNN: <业务描述>`

      **Step 5 — 触发人工确认门**
      - 展示所有已创建制品的摘要
      - 呈现门禁提示，等待 APPROVE 或修改意见

  # ──────────────────────────────────────────────────────
  # 阶段 2：apply（编码实现）
  # ──────────────────────────────────────────────────────
  apply:
    description: "编码实现：SHA256 验证 → git worktree → brainstorming → writing-plans → subagent TDD"
    optional: false
    requires:
      - proposal
      - spec
      - design
      - tasks
    sha256_verify: propose-approved # ⚡ 启动前必须验证 propose 阶段的 SHA256 锁
    gate: null
    produces:
      - plan
    skills:
      - name: using-git-worktrees
        order: 1
        trigger: mandatory
        description: |
          创建隔离的 Git 工作空间（worktree），保持主分支不受施工影响。
          分支命名规范：opsx/{change-name}

      - name: brainstorming
        order: 2
        trigger: mandatory
        description: |
          基于 propose 阶段已批准的制品，进行苏格拉底式工程分析。
          输入：proposal.md + specs/{change}.md + design.md（均已 SHA256 锁定）
          目标：澄清实现细节，为 writing-plans 提供工程决策依据。
          ⚠️ 不重新讨论需求——需求已在 propose 阶段确定并锁定。
          ⚠️ 不读取 tasks.md——brainstorming 分析的是设计文档，不是业务任务清单。

      - name: writing-plans
        order: 3
        trigger: mandatory
        description: |
          基于 brainstorming 分析结果，生成工程实现计划。
          输出：.superpowers/impl-plan.md
          ⚠️ 关键约束：
            - 生成的是工程实现步骤（2-5分钟粒度），不是业务描述
            - 每个步骤标注 TDD 阶段：[RED] / [GREEN] / [REFACTOR]
            - 完全独立于 OpenSpec 的 tasks.md（两者不互相依赖）
            - tasks.md 是业务追踪，impl-plan.md 是工程执行——两份文档，两种用途

      - name: subagent-driven-development
        order: 4
        trigger: mandatory
        description: |
          按 .superpowers/impl-plan.md 的步骤，逐任务派发独立子代理执行。
          每个子代理：独立上下文 + 单一 RED 或 GREEN 任务（物理隔离，防止批量执行）。
          子代理必须提供证据：实际测试命令输出（含 pass/fail 统计）。

      - name: test-driven-development
        order: 5
        trigger: mandatory
        description: |
          配合 subagent-driven-development，强制 RED-GREEN-REFACTOR 循环。
          - RED：子代理先写失败测试，提供测试失败输出作为证据
          - GREEN：子代理写最少代码使测试通过，提供通过输出作为证据
          - REFACTOR：可合并到 GREEN 任务末尾，或单独步骤

    instruction: |
      ## /opsx:apply — 编码实现阶段

      ### 前置校验（MANDATORY）
      在任何实现操作之前，执行 SHA256 校验：
      1. 读取锁文件：.opsx/locks/{change}.propose-approved.lock.json
      2. 重新计算以下文件的 SHA256：
         - proposal.md
         - specs/{change}.md
         - design.md
         - tasks.md
      3. 逐一对比哈希值
      4. 若任意文件不一致 → 立即中止，输出告警信息，引导用户处理

      ### 执行序列（MANDATORY，不可跳过任一步骤）

      **Step 1 — [MANDATORY] Superpowers:using-git-worktrees**
      创建工作分支：opsx/{change}

      **Step 2 — [MANDATORY] Superpowers:brainstorming**
      读取 proposal.md、specs/{change}.md、design.md 进行工程分析。
      产出：工程决策摘要（供 writing-plans 使用）

      **Step 3 — [MANDATORY] Superpowers:writing-plans**
      基于 Step 2 的分析结果，生成 .superpowers/impl-plan.md。
      WARNING: 绝对禁止读取 tasks.md 作为 writing-plans 的输入。
      tasks.md = OpenSpec 业务追踪（不是工程步骤）
      impl-plan.md = 工程实现步骤（不是业务描述）

      **Step 4 — [MANDATORY] Superpowers:subagent-driven-development**
      按 impl-plan.md 逐步骤执行。
      每步骤 = 一个独立子代理 = 物理上下文隔离。

      **Step 5 — [MANDATORY] Superpowers:test-driven-development**
      每个 [RED] 步骤：子代理提供测试失败输出
      每个 [GREEN] 步骤：子代理提供测试通过输出

  # ──────────────────────────────────────────────────────
  # 阶段 3：verify（评审 + 测试）
  # ──────────────────────────────────────────────────────
  verify:
    description: "代码评审+测试验证，完成后触发人工确认门并锁定 SHA256"
    optional: false
    requires:
      - plan
    sha256_verify: null # apply 无输出锁，verify 聚焦评审产出
    gate: verify-approved # 完成后触发人工门禁
    skills:
      - name: requesting-code-review
        order: 1
        trigger: mandatory
        description: |
          作者/审查者严格分离的双通道代码审查。
          产出：.superpowers/code-review-report.md
          审查维度：
          - 实现是否与 specs/ 场景一致（行为正确性）
          - 代码质量（可读性、可维护性）
          - 测试覆盖（是否覆盖所有 spec 场景）
          - 安全审查（OWASP Top 10）

      - name: finishing-a-development-branch
        order: 2
        trigger: mandatory
        description: |
          完成分支的最终验证：
          - 所有测试通过（0 failing）
          - 分支与主干无冲突
          - git log 清晰（含 RED→GREEN 提交记录）
          - 测试覆盖率达到预设阈值

    instruction: |
      ## /opsx:verify — 评审+测试阶段

      ### 执行序列（MANDATORY）

      **Step 1 — [MANDATORY] Superpowers:requesting-code-review**
      执行双通道代码审查。
      产出文件：.superpowers/code-review-report.md（必须包含：
        - 审查结论（PASS / CONDITIONAL / FAIL）
        - 具体发现（每条问题带文件+行号）
        - 与 spec 场景的对应验证结果
      ）

      **Step 2 — [MANDATORY] Superpowers:finishing-a-development-branch**
      执行分支完成验证。
      产出：完整测试报告（实际命令输出，非摘要）

      **Step 3 — 收集验证证据并触发人工确认门**
      向用户呈现：
      - 测试结果汇总（X passing, 0 failing）
      - 代码审查结论
      - 分支状态
      等待用户输入 APPROVE 或修改意见。

  # ──────────────────────────────────────────────────────
  # 阶段 4：archive（提 PR + 资料整理）
  # ──────────────────────────────────────────────────────
  archive:
    description: "提交 PR，归档变更记录，合并增量规范"
    optional: false
    requires: []
    sha256_verify: verify-approved # ⚡ 启动前必须验证 verify 阶段的 SHA256 锁
    gate: null
    skills: []
    instruction: |
      ## /opsx:archive — PR + 资料整理阶段

      ### 前置校验（MANDATORY）
      在任何 PR 操作之前，执行 SHA256 校验：
      1. 读取锁文件：.opsx/locks/{change}.verify-approved.lock.json
      2. 重新计算：.superpowers/impl-plan.md、.superpowers/code-review-report.md
      3. 若不一致 → 立即中止，告警提示

      ### 执行序列

      **Step 1 — 提交 Pull Request**
      PR 描述模板：
      - 变更概述（来自 proposal.md）
      - 行为变更（来自 specs/{change}.md）
      - 技术方案摘要（来自 design.md）
      - 测试证据（链接测试报告）
      - 代码审查结论（链接 code-review-report.md）

      **Step 2 — 归档变更记录**
      将以下内容归档到 .opsx/history/{change}.md：
      - 完整制品快照路径
      - SHA256 锁文件路径
      - PR 链接
      - 关键决策摘要

      **Step 3 — 合并增量规范**
      执行 /opsx:sync 将 specs/{change}.md 合并到主规范文档。

      **Step 4 — 标记变更完成**
      将 tasks.md 中所有 task 标记为 [x]。
      更新变更状态为 DONE。

# ============================================================
# Superpowers Skill 库索引（七核心工作流）
# ============================================================
# 说明：本节记录 spec-driven-nio 使用的 Superpowers 技能及其在本 schema 中的角色。
# 技能文件路径：~/.claude/skills/superpowers-*/SKILL.md

superpowers_skills:
  brainstorming:
    used_in: [apply]
    role: |
      苏格拉底式工程分析——基于已锁定的 propose 制品，澄清实现决策。
      不做需求讨论（需求已锁定），只做工程决策。
    input_artifacts: [proposal, spec, design]
    note: "apply 阶段专用，explore 阶段禁止使用"

  using-git-worktrees:
    used_in: [apply]
    role: "创建 opsx/{change} 隔离工作空间，保护主分支"

  writing-plans:
    used_in: [apply]
    role: |
      生成 .superpowers/impl-plan.md（工程实现步骤，2-5分钟粒度）。
      输入：brainstorming 分析结果（不是 tasks.md）
      输出：独立于 OpenSpec tasks.md 的工程步骤文档
    architectural_note: |
      ⚠️ 两文档分离原则（不可混淆）：
      - OpenSpec tasks.md      = 业务任务清单（WHAT to do）→ OpenSpec checkbox 追踪
      - Superpowers impl-plan.md = 工程实现步骤（HOW to implement）→ subagent 执行

  subagent-driven-development:
    used_in: [apply]
    role: "按 impl-plan.md 步骤逐任务派发独立子代理，物理隔离上下文，防止批量执行"

  test-driven-development:
    used_in: [apply]
    role: "配合 subagent-driven-development，强制 RED-GREEN-REFACTOR 循环"
    tdd_constraint: |
      每个 [RED] 步骤：子代理只写测试（必须失败）
      每个 [GREEN] 步骤：子代理写最少实现（必须通过）
      证据要求：实际测试命令输出（npm test / pytest / etc.）

  requesting-code-review:
    used_in: [verify]
    role: "作者/审查者分离的双通道代码审查，产出 .superpowers/code-review-report.md"

  finishing-a-development-branch:
    used_in: [verify]
    role: "分支完成验证：全量测试通过 + 分支清洁 + 覆盖率达标"

# ============================================================
# 全局规则（Global Rules）
# ============================================================

rules:
  specs:
    format: GIVEN_WHEN_THEN
    require_scenarios: true
    min_scenarios_per_change: 2

  tasks:
    format: checkbox
    prefix_pattern: "TASK-[0-9]{3}"
    each_task_links_to_spec: true
    note: "业务任务清单，不含工程实现步骤"

  plan:
    format: checkbox
    tdd_phase_required: true # 每步骤必须标注 [RED] / [GREEN] / [REFACTOR]
    step_duration_minutes: "2-5"
    evidence_required: true # 每步骤必须包含证据要求
    note: "工程实现步骤，独立于 tasks.md"

  sha256:
    check_on_start: [apply, archive] # 这两个命令启动时必须验证 SHA256
    lock_on_gate: [propose-approved, verify-approved]

  superpowers:
    explore_no_brainstorming: true # explore 阶段禁止 brainstorming
    apply_skill_order: mandatory # apply 技能执行顺序不可改变
    evidence_mandatory: true # subagent 必须提供测试输出证据
